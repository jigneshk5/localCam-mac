name: LocalCamMac
options:
  bundleIdPrefix: app.localcam
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: 5.0
    CODE_SIGN_STYLE: Automatic
targets:
  Local Cam:
    type: application
    platform: macOS
    sources:
      - path: LocalCamMac
    info:
      path: LocalCamMac/Info.plist
      properties:
        CFBundleDisplayName: Local Cam
        CFBundleIconName: AppIcon
        LSApplicationCategoryType: public.app-category.utilities
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSLocalNetworkUsageDescription: Local Cam uses your local network to discover ONVIF cameras nearby.
    settings:
      base:
        PRODUCT_NAME: Local Cam
        PRODUCT_BUNDLE_IDENTIFIER: rtsptest.geekpoint.local
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: LocalCamMac/LocalCamMac.entitlements
        GENERATE_INFOPLIST_FILE: NO
    scheme:
      gatherCoverageData: false
