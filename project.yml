name: LocalCamMac
options:
  bundleIdPrefix: app.localcam
  deploymentTarget:
    macOS: "15.0"
settings:
  base:
    SWIFT_VERSION: 5.0
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 24695W2375
    MARKETING_VERSION: 1.2.1
    CURRENT_PROJECT_VERSION: 8
targets:
  Local Cam:
    type: application
    platform: macOS
    sources:
      - path: LocalCamMac
    info:
      path: LocalCamMac/Info.plist
      properties:
        CFBundleDisplayName: Local Cam
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSUIElement: false
        LSApplicationCategoryType: public.app-category.utilities
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSLocalNetworkUsageDescription: Local Cam uses your local network to discover cameras and play their live video streams.
    settings:
      base:
        PRODUCT_NAME: Local Cam
        PRODUCT_BUNDLE_IDENTIFIER: rtsptest.geekpoint.local
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: LocalCamMac/LocalCamMac.entitlements
        GENERATE_INFOPLIST_FILE: NO
    scheme:
      gatherCoverageData: false
